<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Machine à Invocation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <section class="machine"> 
        <h1>La Machine à Invocation</h1>
        
            <form id="invocation">

                <label for="prenom">Ton prénom</label>
                    <input id="prenom" type="text" placeholder="Entrez votre prénom">
                    <label for="creature">choisis la créature</label>

                <select id="creature">
                    <option>🐙 le Chat-Octo</option>
                    <option>🐉 le Dragon-Debug</option>
                    <option>🦄 la Licorne-CSS</option>
                    <option>🦊 le Renard-Refacto</option>
                </select>

                <button type="submit">Invoquer</button>

            </form>

        <section id="resultat" class="cache"> 
                <p id="message"></p>
        </section>
           
    </section>

<script src="script.js"></script>
</body>

</html>
